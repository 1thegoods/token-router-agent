<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Router — AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --bg-input: #16162a;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a8;
            --text-muted: #555570;
            --accent: #6c5ce7;
            --accent-glow: rgba(108,92,231,0.3);
            --accent-2: #a29bfe;
            --success: #00cec9;
            --warning: #fdcb6e;
            --error: #ff6b6b;
            --user-bubble: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --ai-bubble: rgba(255,255,255,0.04);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ─── Sidebar ───────────────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: var(--transition);
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .btn-new-chat {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
        }
        
        .btn-new-chat:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--border-hover);
        }
        
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .session-list::-webkit-scrollbar { width: 4px; }
        .session-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        
        .session-item {
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-secondary);
            transition: var(--transition);
            font-size: 14px;
        }
        
        .session-item:hover {
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
        }
        
        .session-item.active {
            background: rgba(108,92,231,0.15);
            color: var(--accent-2);
            font-weight: 500;
        }
        
        .session-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .session-delete {
            opacity: 0;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            transition: var(--transition);
        }
        
        .session-item:hover .session-delete { opacity: 1; }
        .session-delete:hover { color: var(--error); }

        /* ─── Main Content ──────────────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ─── Header ────────────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(18,18,26,0.8);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: var(--user-bubble);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-title {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.3px;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stats-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(0,206,201,0.1);
            border: 1px solid rgba(0,206,201,0.2);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--success);
        }

        .stats-pill .dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ─── Chat Area ─────────────────────────────────────────────── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
        }

        /* ─── Welcome ───────────────────────────────────────────────── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            opacity: 0.7;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 56px;
            margin-bottom: 8px;
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 420px;
            line-height: 1.6;
        }

        .welcome-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .welcome-chip {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .welcome-chip:hover {
            border-color: var(--accent);
            color: var(--accent-2);
            background: rgba(108,92,231,0.08);
        }

        /* ─── Messages ──────────────────────────────────────────────── */
        .message {
            display: flex;
            gap: 12px;
            max-width: 780px;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .message.user .avatar {
            background: var(--user-bubble);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .message.assistant .avatar {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.65;
            font-size: 14px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bubble pre {
            background: rgba(0,0,0,0.3);
            padding: 14px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bubble code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .bubble p + p { margin-top: 10px; }

        /* ─── Message Meta ──────────────────────────────────────────── */
        .message-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .meta-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-badge.local {
            background: rgba(0,206,201,0.12);
            color: var(--success);
        }

        .meta-badge.fireworks {
            background: rgba(253,203,110,0.12);
            color: var(--warning);
        }

        /* ─── File Attachments ──────────────────────────────────────── */
        .attachment {
            margin-bottom: 10px;
        }

        .attachment img {
            max-width: 300px;
            max-height: 250px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .attachment-file {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .attachment-file .file-icon { font-size: 16px; }
        .attachment-file .file-name { color: var(--accent-2); }
        .attachment-file .file-size { color: var(--text-muted); font-size: 11px; }

        /* ─── Typing Indicator ──────────────────────────────────────── */
        .typing {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-bottom-left-radius: 4px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s ease infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* ─── Input Area ────────────────────────────────────────────── */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
        }

        .file-preview-bar {
            display: flex;
            gap: 8px;
            padding-bottom: 10px;
            overflow-x: auto;
        }

        .file-preview-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .file-preview-item .remove {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            transition: var(--transition);
        }

        .file-preview-item .remove:hover { color: var(--error); }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: flex-end;
            padding: 4px;
            transition: var(--transition);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            resize: none;
            outline: none;
            max-height: 150px;
            line-height: 1.5;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .btn-attach {
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            transition: var(--transition);
            display: flex;
            align-items: center;
        }

        .btn-attach:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
        }

        .btn-send {
            width: 44px;
            height: 44px;
            background: var(--user-bubble);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── Drop Zone ─────────────────────────────────────────────── */
        .drop-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10,10,15,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .drop-overlay.active { display: flex; }

        .drop-box {
            padding: 60px 80px;
            border: 2px dashed var(--accent);
            border-radius: 24px;
            text-align: center;
            color: var(--accent-2);
            font-size: 18px;
            font-weight: 500;
        }

        .drop-box .icon { font-size: 48px; margin-bottom: 12px; }

        /* ─── Hidden ────────────────────────────────────────────────── */
        .hidden { display: none !important; }

        #fileInput { display: none; }

        /* ─── Responsive ────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -280px;
                height: 100%;
                z-index: 50;
            }
            .sidebar.open { left: 0; }
            .header { padding: 12px 16px; }
            .chat-area { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .message { max-width: 100%; }
            .welcome-chips { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="btn-new-chat" onclick="createNewSession()">
                <span>+</span> New Chat
            </button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- Sessions injected here -->
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">⚡</div>
                <div>
                    <div class="header-title">Token Router</div>
                    <div class="header-subtitle">Agentic Multi-Model</div>
                </div>
            </div>
            <div class="header-right">
                <div class="stats-pill">
                    <span class="dot"></span>
                    <span id="statsText">0 tokens used</span>
                </div>
            </div>
        </header>

        <!-- Chat -->
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">⚡</div>
                <h2>Token Router Agent</h2>
                <p>Chat with your local AI models. Give complex tasks to launch parallel agents with local system tools.</p>
                <div class="welcome-chips">
                    <button class="welcome-chip" onclick="sendQuickMessage(this)">Search the web for latest AI news</button>
                    <button class="welcome-chip" onclick="sendQuickMessage(this)">Create a python script that adds two numbers</button>
                </div>
            </div>
        </div>

        <!-- Drop overlay -->
        <div class="drop-overlay" id="dropOverlay">
            <div class="drop-box">
                <div class="icon">📎</div>
                Drop files here
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="file-preview-bar hidden" id="filePreviewBar"></div>
            <div class="input-row">
                <div class="input-wrapper">
                    <button class="btn-attach" onclick="document.getElementById('fileInput').click()" title="Attach file">📎</button>
                    <textarea id="messageInput" placeholder="Ask anything... (Shift+Enter for new line)" rows="1" onkeydown="handleKeyDown(event)"></textarea>
                </div>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*,.txt,.py,.js,.ts,.html,.css,.json,.md,.csv,.java,.cpp,.c,.rs,.go,.rb,.yaml,.yml,.xml,.sql,.sh,.log" onchange="handleFileSelect(event)">
        </div>
    </div>

    <script>
        // ─── State ──────────────────────────────────────────────────
        let currentSessionId = null;
        let pendingFiles = [];
        let isLoading = false;

        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');
        const filePreviewBar = document.getElementById('filePreviewBar');
        const dropOverlay = document.getElementById('dropOverlay');
        const sessionList = document.getElementById('sessionList');

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
        });

        // ─── Sessions ──────────────────────────────────────────────
        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const sessions = await res.json();
                
                if (sessions.length === 0) {
                    await createNewSession();
                    return;
                }
                
                if (!currentSessionId) {
                    currentSessionId = sessions[0].id;
                }
                
                renderSessionList(sessions);
                await loadChat(currentSessionId);
            } catch (e) {
                console.error("Failed to load sessions", e);
            }
        }
        
        function renderSessionList(sessions) {
            sessionList.innerHTML = sessions.map(s => `
                <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="switchSession('${s.id}')">
                    <span class="session-title">${s.title}</span>
                    <span class="session-delete" onclick="deleteSession(event, '${s.id}')">✕</span>
                </div>
            `).join('');
        }
        
        async function createNewSession() {
            try {
                const res = await fetch('/api/sessions', { method: 'POST' });
                const data = await res.json();
                currentSessionId = data.id;
                
                chatArea.innerHTML = '';
                chatArea.appendChild(welcome);
                welcome.classList.remove('hidden');
                
                await loadSessions();
            } catch (e) {}
        }
        
        async function switchSession(id) {
            if (id === currentSessionId) return;
            currentSessionId = id;
            await loadSessions(); // re-render list
        }
        
        async function deleteSession(e, id) {
            e.stopPropagation();
            try {
                await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
                if (id === currentSessionId) {
                    currentSessionId = null;
                }
                await loadSessions();
            } catch (e) {}
        }
        
        async function loadChat(id) {
            try {
                const res = await fetch(`/api/sessions/${id}`);
                const data = await res.json();
                
                chatArea.innerHTML = '';
                
                if (!data.messages || data.messages.length === 0) {
                    chatArea.appendChild(welcome);
                    welcome.classList.remove('hidden');
                } else {
                    data.messages.forEach(msg => {
                        // filter out tool result blocks for cleaner UI, or keep them if needed
                        let content = msg.content;
                        if (msg.role === 'user' && content.includes('[TOOL_RESULT]')) {
                            return; // skip raw tool results in UI
                        }
                        if (msg.role === 'assistant' && content.includes('[TOOL_CALL]')) {
                            // optionally style tool calls differently
                            addMessage(msg.role, content);
                        } else {
                            addMessage(msg.role, content);
                        }
                    });
                }
            } catch (e) {}
        }

        // ─── Keyboard ──────────────────────────────────────────────
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // ─── Quick Message ─────────────────────────────────────────
        function sendQuickMessage(btn) {
            messageInput.value = btn.textContent;
            sendMessage();
        }

        // ─── File Handling ─────────────────────────────────────────
        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            files.forEach(f => uploadFile(f));
            e.target.value = '';
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                pendingFiles.push(data);
                renderFilePreviews();
            } catch (err) {
                alert('Upload failed: ' + err.message);
            }
        }

        function renderFilePreviews() {
            if (pendingFiles.length === 0) {
                filePreviewBar.classList.add('hidden');
                return;
            }
            filePreviewBar.classList.remove('hidden');
            filePreviewBar.innerHTML = pendingFiles.map((f, i) => `
                <div class="file-preview-item">
                    <span>${f.type === 'image' ? '🖼️' : '📄'}</span>
                    <span>${f.filename}</span>
                    <span class="remove" onclick="removeFile(${i})">✕</span>
                </div>
            `).join('');
        }

        function removeFile(idx) {
            pendingFiles.splice(idx, 1);
            renderFilePreviews();
        }

        // ─── Drag & Drop ──────────────────────────────────────────
        let dragCounter = 0;
        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropOverlay.classList.add('active');
        });
        document.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter <= 0) {
                dragCounter = 0;
                dropOverlay.classList.remove('active');
            }
        });
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('active');
            Array.from(e.dataTransfer.files).forEach(f => uploadFile(f));
        });

        // ─── Send Message ──────────────────────────────────────────
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            if (welcome) welcome.remove();

            // Build user message with attachments
            let attachmentHTML = '';
            let fileContext = '';
            let imageB64 = '';

            pendingFiles.forEach(f => {
                if (f.type === 'image') {
                    attachmentHTML += `<div class="attachment"><img src="data:image/png;base64,${f.image_b64}" alt="${f.filename}"></div>`;
                    imageB64 = f.image_b64;
                } else {
                    const sizeStr = f.size > 1024 ? (f.size / 1024).toFixed(1) + ' KB' : f.size + ' B';
                    attachmentHTML += `<div class="attachment"><div class="attachment-file"><span class="file-icon">📄</span><span class="file-name">${f.filename}</span><span class="file-size">${sizeStr}</span></div></div>`;
                    fileContext += `--- ${f.filename} ---\n${f.content}\n\n`;
                }
            });

            // Add user message to UI
            addMessage('user', text, attachmentHTML);

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            pendingFiles = [];
            renderFilePreviews();

            // Show typing indicator
            showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        message: text,
                        file_context: fileContext,
                        image_b64: imageB64,
                    }),
                });

                const data = await res.json();
                hideTyping();

                const isLocal = data.provider === 'ollama';
                const meta = `
                    <div class="message-meta">
                        <span class="meta-badge ${isLocal ? 'local' : 'fireworks'}">${isLocal ? '🏠 Local' : '☁️ Fireworks'}</span>
                        <span>${data.model || 'unknown'}</span>
                        <span>•</span>
                        <span>${data.input_tokens + data.output_tokens} tokens</span>
                        <span>•</span>
                        <span>${(data.latency_ms / 1000).toFixed(1)}s</span>
                    </div>
                `;

                addMessage('assistant', data.answer, '', meta);
                updateStats();
                loadSessions(); // Update title if new chat
            } catch (err) {
                hideTyping();
                addMessage('assistant', 'Connection error — is the server running?');
            }

            isLoading = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        // ─── DOM Helpers ───────────────────────────────────────────
        function addMessage(role, text, attachments = '', metaHTML = '') {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '⚡';
            const formattedText = formatMessage(text);

            div.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div>
                    ${attachments}
                    <div class="bubble">${formattedText}</div>
                    ${metaHTML}
                </div>
            `;

            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatMessage(text) {
            if (!text) return '';

            // Escape HTML
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Code blocks
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // Line breaks
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="avatar" style="background:var(--bg-card);border:1px solid var(--border);">⚡</div>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                const total = data.local_tokens;
                const calls = data.local_calls;
                document.getElementById('statsText').textContent =
                    `${total.toLocaleString()} free tokens • ${calls} calls`;
            } catch (e) {}
        }

        // Init
        loadSessions();
        updateStats();
        messageInput.focus();
    </script>
</body>
</html>
